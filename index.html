<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiDAR Visualizations</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0b0f19;
            color: #f3f4f6;
            padding: 3rem 2rem;
            margin: 0;
        }
        .container { max-width: 640px; margin: 0 auto; }
        h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 0.4rem; }
        p.sub { color: #9ca3af; margin-bottom: 2.5rem; font-size: 0.95rem; }
        ul { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 0.6rem; }
        li a {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.85rem 1.1rem;
            background: #141b2d;
            border: 1px solid #242f47;
            border-radius: 8px;
            color: #f3f4f6;
            text-decoration: none;
            font-size: 0.97rem;
            transition: border-color 0.15s, background 0.15s;
        }
        li a:hover { border-color: #10b981; background: #162232; }
        li a::before { content: "↗"; color: #10b981; font-size: 1rem; flex-shrink: 0; }
    </style>
</head>
<body>
<div class="container">
    <h1>LiDAR Visualizations</h1>
    <p class="sub">Click a file to open it.</p>
    <ul>
        <!-- Add a line here for each HTML file you drop in this folder, e.g.: -->
        <!-- <li><a href="occupancy_raw_3d.html">occupancy_raw_3d</a></li> -->
    </ul>
</div>
</body>
</html>
