<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiDAR Point Cloud Visualizations</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #141b2d;
            --border-color: #242f47;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent: #10b981; 
            --accent-glow: rgba(16, 185, 129, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 3rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1.5rem;
        }

        h1 {
            font-size: 2.25rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.25rem;
        }

        @media (min-width: 640px) {
            .grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            text-decoration: none;
            color: inherit;
            transition: all 0.2s ease-in-out;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-2px);
            border-color: var(--accent);
            box-shadow: 0 8px 30px var(--accent-glow);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.75rem;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-main);
            word-break: break-all;
            padding-right: 0.5rem;
        }

        .badge {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            padding: 0.25rem 0.5rem;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            white-space: nowrap;
        }

        .card:hover .badge {
            border-color: rgba(16, 185, 129, 0.3);
            color: var(--accent);
        }

        .card-desc {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
            flex-grow: 1;
        }

        .card-footer {
            display: flex;
            align-items: center;
            font-size: 0.87rem;
            font-weight: 500;
            color: var(--accent);
        }

        .card-footer svg {
            margin-left: 0.25rem;
            transition: transform 0.2s ease;
        }

        .card:hover .card-footer svg {
            transform: translateX(4px);
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 4rem 2rem;
            border: 2px dashed var(--border-color);
            border-radius: 12px;
            color: var(--text-muted);
        }

        footer {
            margin-top: 5rem;
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>LiDAR Pipeline Visualizations</h1>
            <p class="subtitle">Auto-detected point cloud scenes in your root directory.</p>
        </header>

        <main class="grid" id="visualization-grid">
            <!-- Dynamic cards will render here -->
            <div class="empty-state" id="loading-status">Scanning root directory for point clouds...</div>
        </main>

        <footer>
            <p>LiDAR Mapping Sandbox Environment</p>
        </footer>
    </div>

    <script>
        async function loadVisualizations() {
            const grid = document.getElementById('visualization-grid');
            const status = document.getElementById('loading-status');

            try {
                // Fetch the current directory root index parsed by your local server
                const response = await fetch('./');
                const text = await response.text();
                
                // Parse out links using a temporary DOM element
                const parser = new DOMParser();
                const doc = parser.parseFromString(text, 'text/html');
                const links = Array.from(doc.querySelectorAll('a'));
                
                // Filter out self index, hidden elements, and keep only .html files
                const htmlFiles = links
                    .map(link => link.getAttribute('href'))
                    .filter(href => href && href.endsWith('.html') && href !== 'index.html' && !href.startsWith('http'));

                if (htmlFiles.length === 0) {
                    status.innerHTML = "No distinct visualization HTML files found in this directory.<br><span style='font-size:0.85rem; display:block; margin-top:0.5rem;'>Make sure you run this via a local server environment (e.g. <code>python -m http.server</code>).</span>";
                    return;
                }

                // Clear loading status
                grid.innerHTML = '';

                // Build cards dynamically for whatever files are present
                htmlFiles.forEach((filename, index) => {
                    // Clean up string formatting for clean visualization card names
                    let cleanName = filename
                        .replace('.html', '')
                        .replace(/[-_]/g, ' ');
                    
                    // Capitalize words
                    cleanName = cleanName.replace(/\b\w/g, c => c.toUpperCase());

                    const card = document.createElement('a');
                    card.href = filename;
                    card.className = 'card';
                    card.innerHTML = `
                        <div>
                            <div class="card-header">
                                <span class="card-title" title="${filename}">${cleanName}</span>
                                <span class="badge">Cloud ${index + 1}</span>
                            </div>
                            <p class="card-desc">Source file target: <code>${filename}</code></p>
                        </div>
                        <div class="card-footer">
                            Launch Visualizer 
                            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M6 12L10 8L6 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </div>
                    `;
                    grid.appendChild(card);
                });

            } catch (err) {
                console.error("Directory scan error:", err);
                status.innerHTML = "Failed to auto-scan local directory structure.<br><span style='font-size:0.85rem; display:block; margin-top:0.5rem;'>To read files dynamically, open this root folder inside a terminal and start a local host server.</span>";
            }
        }

        // Run detection loop on document load
        window.addEventListener('DOMContentLoaded', loadVisualizations);
    </script>
</body>
</html>
